version: 2
updates:
  # GitHub Actions used by the workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  # Go module dependencies. Minor/patch bumps are batched into a single PR to
  # keep noise low; major bumps come as individual PRs so they get scrutiny.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    ignore:
      # Pinned to v0.1.0: docker/docker v28.5.2 requires the top-level
      # archive.Compression alias that go-archive removed in v0.2.0, so bumping
      # it breaks `go vet`. Unpin once docker/docker is upgraded to a release
      # compatible with go-archive >= v0.2.0.
      - dependency-name: "github.com/moby/go-archive"
    groups:
      go-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # Base images in the Dockerfile (golang:*-alpine builder, alpine runtime)
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
